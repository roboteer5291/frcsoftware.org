name: Compile Examples

on:
    push:
        branches: [main]
    pull_request:

jobs:
    stage0:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '25'
            - run: |
                  for f in *.java; do
                      echo "=== $f ==="
                      javac "$f"
                      java "${f%.java}"
                  done
              working-directory: examples/stage0/snippets

    robotProjects:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '25'
            - run: ./gradlew build
              working-directory: examples
